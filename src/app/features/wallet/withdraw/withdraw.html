<div class="max-w-lg mx-auto space-y-8 animate-in fade-in duration-700 pb-10">

  <div class="flex items-center gap-4">
    <a routerLink="/wallet" class="p-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <div>
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Withdraw</h1>
      <p class="text-gray-500 text-sm font-medium">Cash out to your bank account or card</p>
    </div>
  </div>

  <!-- Success state -->
  <div *ngIf="success" class="bg-green-50 border border-green-200 rounded-2xl p-8 text-center space-y-4">
    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto">
      <span class="material-symbols-outlined text-green-600 text-3xl">check_circle</span>
    </div>
    <p class="text-xl font-extrabold text-gray-900">Withdrawal Successful!</p>
    <p class="text-sm text-gray-500">New balance: <strong class="text-green-700">{{ newBalance | number:'1.2-2' }} TND</strong></p>
    <button (click)="goHome()" class="w-full py-3 bg-[#135bec] text-white rounded-xl font-bold text-sm hover:bg-blue-700 transition-all">Back to Wallet</button>
  </div>

  <!-- Form -->
  <div *ngIf="!success" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 space-y-6">
    <div *ngIf="error" class="bg-red-50 border border-red-100 rounded-xl p-4 flex items-center gap-2">
      <span class="material-symbols-outlined text-red-500 text-[18px]">error</span>
      <p class="text-sm text-red-700 font-medium">{{ error }}</p>
    </div>

    <div class="space-y-2">
      <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest">Amount (TND)</label>
      <div class="relative">
        <input type="number" [(ngModel)]="amount" placeholder="0.00" min="1"
          class="w-full pl-4 pr-16 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-lg font-bold text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#135bec]/20 focus:border-[#135bec] transition-all" />
        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-sm">TND</span>
      </div>
    </div>

    <div class="space-y-2">
      <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest">Description (optional)</label>
      <input type="text" [(ngModel)]="description" placeholder="e.g. Rent payment"
        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#135bec]/20 focus:border-[#135bec] transition-all" />
    </div>

    <button (click)="submit()" [disabled]="loading"
      class="w-full px-4 py-3 bg-[#135bec] text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition-all shadow-md disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
      <span *ngIf="loading" class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span>
      {{ loading ? 'Processing…' : 'Withdraw Funds' }}
    </button>
  </div>

  <div class="bg-blue-50 rounded-2xl border border-blue-100 p-4 flex items-start gap-3">
    <span class="material-symbols-outlined text-blue-600 shrink-0">info</span>
    <p class="text-sm text-gray-700">Withdrawals usually take 1-2 business days to appear in your bank account.</p>
  </div>
</div>
