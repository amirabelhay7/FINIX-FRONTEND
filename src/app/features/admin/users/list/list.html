<div class="users-page s2">
  <div class="ph users-header">
    <div>
      <div class="ph-eyebrow">Identity & Access</div>
      <div class="ph-title">{{ pageTitle }}</div>
      <div class="ph-desc">{{ pageSubtitle }}</div>
    </div>
    <div class="ph-actions">
      <a routerLink="/admin/users/new" class="btn btn-primary btn-sm">+ Add user</a>
    </div>
  </div>

  <section class="panel users-panel s3">
    <div class="panel-head users-toolbar">
      <div class="tb-search users-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          type="text"
          placeholder="Search by name, email, CIN, city..."
          [(ngModel)]="searchTerm"
        />
      </div>

      <select
        class="users-role-filter"
        aria-label="Role filter"
        [(ngModel)]="selectedRole"
      >
        <option value="">All roles</option>
        <option value="CLIENT">CLIENT</option>
        <option value="AGENT">AGENT</option>
        <option value="SELLER">SELLER</option>
        <option value="INSURER">INSURER</option>
        <option value="ADMIN">ADMIN</option>
      </select>
    </div>

    <div class="users-feedback" *ngIf="loading">Loading users...</div>

    <div class="users-feedback users-error" *ngIf="!loading && errorMessage">
      {{ errorMessage }}
      <button type="button" class="btn btn-outline btn-xs" (click)="loadUsers()">Retry</button>
    </div>

    <div class="tbl-wrap users-table-wrap" *ngIf="!loading && !errorMessage && filteredUsers.length > 0">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>CIN</th>
            <th>City</th>
            <th style="text-align: right">Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let user of filteredUsers" [class.users-row-me]="isCurrentUser(user)">
            <td>
              <div class="td-primary">{{ user.name }}</div>
            </td>
            <td>
              <div class="td-sub users-email">{{ user.email }}</div>
            </td>
            <td>
              <span class="badge" [ngClass]="user.roleClass">{{ user.role }}</span>
            </td>
            <td>
              <span class="users-id">{{ user.cin }}</span>
            </td>
            <td>
              <span class="td-sub">{{ user.city }}</span>
            </td>
            <td class="users-actions-cell">
              <a [routerLink]="user.viewRoute" class="btn btn-ghost btn-xs">View</a>
              <a [routerLink]="user.editRoute" class="btn btn-outline btn-xs">Edit</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="users-feedback" *ngIf="!loading && !errorMessage && filteredUsers.length === 0">
      No users found for the current filters.
    </div>
  </section>
</div>
