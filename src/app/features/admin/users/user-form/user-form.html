<div class="users-form-page s2">
  <div class="ph users-form-header">
    <div>
      <div class="ph-eyebrow">Identity & Access</div>
      <div class="ph-title">{{ pageTitle }}</div>
      <div class="ph-desc">{{ pageSubtitle }}</div>
    </div>
    <div class="ph-actions">
      <a [routerLink]="backRoute" class="btn btn-ghost btn-sm">Back to users</a>
    </div>
  </div>

  <section class="panel users-form-panel s3">
    <div class="panel-head users-form-intro">
      Required fields are marked with <span>*</span>.
    </div>

    <div class="users-feedback" *ngIf="loading">Loading user...</div>
    <div class="users-feedback users-error" *ngIf="!loading && errorMessage">{{ errorMessage }}</div>
    <div class="users-feedback users-success" *ngIf="!loading && successMessage">{{ successMessage }}</div>

    <form *ngIf="!loading" class="users-form-grid" (ngSubmit)="submit()">
      <label class="users-field">
        <span>First name *</span>
        <input type="text" name="firstName" [(ngModel)]="form.firstName" />
      </label>

      <label class="users-field">
        <span>Last name *</span>
        <input type="text" name="lastName" [(ngModel)]="form.lastName" />
      </label>

      <label class="users-field users-field-full">
        <span>Email *</span>
        <input type="email" name="email" [(ngModel)]="form.email" />
      </label>

      <label class="users-field">
        <span>Phone</span>
        <input type="text" name="phoneNumber" [(ngModel)]="form.phoneNumber" />
      </label>

      <label class="users-field">
        <span>CIN</span>
        <input type="text" name="cin" [(ngModel)]="form.cin" />
      </label>

      <label class="users-field">
        <span>Role *</span>
        <select name="role" [(ngModel)]="form.role">
          <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
        </select>
      </label>

      <label class="users-field">
        <span>{{ editingUserId ? 'New password (optional)' : 'Password *' }}</span>
        <input type="password" name="password" [(ngModel)]="form.password" />
      </label>

      <label class="users-field users-field-full">
        <span>Address</span>
        <input type="text" name="address" [(ngModel)]="form.address" />
      </label>

      <label class="users-field">
        <span>City</span>
        <input type="text" name="city" [(ngModel)]="form.city" />
      </label>

      <div class="users-form-actions users-field-full">
        <a [routerLink]="backRoute" class="btn btn-outline btn-sm">Cancel</a>
        <button type="submit" class="btn btn-primary btn-sm" [disabled]="saving || !isValid">
          {{ submitLabel }}
        </button>
      </div>
    </form>
  </section>
</div>
