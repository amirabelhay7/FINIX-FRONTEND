<div class="notif-page">
  <div class="notif-toolbar">
    <a class="notif-back" [routerLink]="homeRoute">← Back</a>
  </div>
  <div class="notif-head">
    <h1 class="notif-title">{{ pageTitle }}</h1>
    <p class="notif-sub">{{ pageSubtitle }}</p>
  </div>

  <div class="notif-panel" *ngIf="loading">Loading…</div>
  <div class="notif-err" *ngIf="!loading && errorMessage">{{ errorMessage }}</div>

  <ul class="notif-list" *ngIf="!loading && !errorMessage">
    <li *ngFor="let n of items" class="notif-item" [class.notif-item-unread]="isUnread(n)">
      <div class="notif-item-main">
        <div class="notif-item-title">{{ n.title || 'Notification' }}</div>
        <div class="notif-item-body" *ngIf="n.body">{{ n.body }}</div>
        <div class="notif-item-meta">{{ formatWhen(n.createdAt) }}</div>
      </div>
      <button type="button" class="notif-mark" *ngIf="isUnread(n)" (click)="markRead(n)">Mark read</button>
    </li>
  </ul>
  <p class="notif-empty" *ngIf="!loading && !errorMessage && items.length === 0">No notifications yet.</p>
</div>
