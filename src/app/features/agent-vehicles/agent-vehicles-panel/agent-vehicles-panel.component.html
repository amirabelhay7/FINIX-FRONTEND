<form [formGroup]="form" class="agent-vehicles-panel">
  <fieldset>
    <legend>Véhicule</legend>
    <label>ID <input type="number" formControlName="id" /></label>
    <label>Vendeur (ID) <input type="number" formControlName="sellerId" /></label>
    <label>Marque <input type="text" formControlName="marque" /></label>
    <label>Modèle <input type="text" formControlName="modele" /></label>
    <label>Titre <input type="text" formControlName="title" /></label>
    <label>Référence <input type="text" formControlName="reference" /></label>
    <label>Immatriculation <input type="text" formControlName="registrationNumber" /></label>
    <label>Couleur <input type="text" formControlName="color" /></label>
    <label>Kilométrage <input type="number" formControlName="mileage" /></label>
  </fieldset>
</form>
