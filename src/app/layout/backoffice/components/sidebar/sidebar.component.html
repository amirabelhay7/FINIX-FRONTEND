<nav class="sidebar">
  <!-- Brand -->
  <div class="sb-brand">
    <div class="sb-logo">
      <img src="/assets/logo.png" alt="FIN'IX Logo" width="20" height="20" />
    </div>
    <div>
      <div class="sb-name">FIN<span>'IX</span></div>
      <div class="sb-sub">Administration</div>
    </div>
  </div>

  <!-- Admin Badge -->
  <div class="sb-admin-badge">
    <div class="sab-dot"></div>
    <div class="sab-txt">Back-Office Admin</div>
  </div>

  <!-- Nav -->
  <div class="sb-nav">
    <div class="sb-section">Dashboard</div>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'dashboard' }"
      (click)="switchPage('dashboard')"
    >
      <div class="sb-ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
      </div>
      Overview
    </button>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'notifications' }"
      (click)="switchPage('notifications')"
    >
      <div class="sb-ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </div>
      Alerts & Notifs
    </button>

    <div class="sb-section">Management</div>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'clients' }"
      (click)="switchPage('clients')"
    >
      <div class="sb-ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
      </div>
      Clients
    </button>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'credits' }"
      (click)="switchPage('credits')"
    >
      <div class="sb-ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
      </div>
      Credits & Folders
    </button>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'repayments' }"
      (click)="switchPage('repayments')"
    >
      <div class="sb-ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23" />
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
        </svg>
      </div>
      Repayments
    </button>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'delinquency' }"
      (click)="switchPage('delinquency')"
    >
      <div class="sb-ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      Delinquency Cases
    </button>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'grace-requests' }"
      (click)="switchPage('grace-requests')"
    >
      <div class="sb-ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      Grace Requests
    </button>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'vehicles' }"
      (click)="switchPage('vehicles')"
    >
      <div class="sb-ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="2" />
          <polygon points="16 8 20 8 23 11 23 16 16 16 16 8" />
          <circle cx="5.5" cy="18.5" r="2.5" />
          <circle cx="18.5" cy="18.5" r="2.5" />
        </svg>
      </div>
      Vehicles
    </button>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'insurance' }"
      (click)="switchPage('insurance')"
    >
      <div class="sb-ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      Insurance
    </button>

    <div class="sb-section">Analysis</div>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'risk' }"
      (click)="switchPage('risk')"
    >
      <div class="sb-ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
      </div>
      Risk & Score
    </button>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'rapports' }"

          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <polyline points="10 9 9 9 8 9" />
        </svg>
      </div>
      Reports
    </button>

    <div class="sb-section">System</div>

    <button
      class="sb-item"
      [ngClass]="{ active: currentPage === 'settings' }"
      (click)="switchPage('settings')"
    >
      <div class="sb-ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>
      Settings
    </button>

  <!-- Footer / User -->
  <div class="sb-footer">
    <div class="sb-user">
      <div class="sb-avatar">{{ adminInitials }}</div>
      <div>
        <div class="sb-uname">{{ adminName }}</div>
        <div class="sb-urole">Admin</div>
      </div>
      <svg style="margin-left: auto; color: rgba(255, 255, 255, 0.3)"
           width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6" />
      </svg>
    </div>
  </div>
</nav>
