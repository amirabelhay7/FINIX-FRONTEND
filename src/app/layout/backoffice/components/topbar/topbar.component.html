<header class="topbar">

  <!-- LEFT : Title + Breadcrumb -->
  <div>
    <div class="tb-title">
      {{ pageMap[currentPage]?.title }}
    </div>

    <div class="tb-breadcrumb">
      <span>FIN'IX</span>
      <span class="tb-sep">/</span>
      <span>
        {{ pageMap[currentPage]?.breadcrumb }}
      </span>
    </div>
  </div>

  <!-- RIGHT SECTION -->
  <div class="tb-right">

    <!-- Search -->
    <div class="tb-search">
      <span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>

      <input
        type="text"
        placeholder="Search client, file, reference…"
        [(ngModel)]="searchValue"
      >
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" (click)="onToggleTheme()" [title]="currentTheme === 'light' ? 'Dark mode' : 'Light mode'">
      <!-- Sun icon (shown in dark mode) -->
      <svg *ngIf="currentTheme === 'dark'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- Moon icon (shown in light mode) -->
      <svg *ngIf="currentTheme === 'light'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

   

    <!-- Notification Button -->
    <button class="tb-btn" (click)="goToNotifications()">
      <svg width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor"
           stroke-width="2"
           stroke-linecap="round"
           stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>

      <!-- Notification indicator -->
      <div *ngIf="hasNotifications" class="notif-dot"></div>
    </button>

  

    <!-- Logout Button -->
    <button class="tb-btn" (click)="loggedOut.emit()" title="Logout">
      <svg width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor"
           stroke-width="2"
           stroke-linecap="round"
           stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>

  </div>

</header>
