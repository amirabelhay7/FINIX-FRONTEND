<!-- ═══════════ TOPBAR ═══════════ -->
<div class="sl-topbar">
  <div class="sl-tb-brand">
    <img class="sl-tb-logo-img" src="/assets/logo.png" alt="FIN'IX Logo">
    <div class="sl-tb-name">FIN<span>'IX</span></div>
  </div>
  <div class="sl-tb-divider"></div>
  <div class="sl-tb-sub">Espace Vendeur · Gestion des offres véhicules</div>
  <div class="sl-tb-right">
    <button type="button" class="sl-tb-btn">🔔<span class="sl-notif-dot"></span></button>
    <button type="button" class="sl-tb-btn">⚙️</button>
    <button type="button" class="sl-theme-toggle" (click)="toggleTheme()" title="Changer le thème">
      {{ currentTheme === 'dark' ? '☀️' : '🌙' }}
    </button>
    <div class="sl-tb-user" (click)="toggleUserDropdown()" style="position:relative;">
      <div class="sl-tb-avatar">
        <img *ngIf="userImageUrl; else sellerInitials" [src]="userImageUrl" class="sl-avatar-img" alt="Profile" />
        <ng-template #sellerInitials>{{ userInitials }}</ng-template>
      </div>
      <div>
        <div class="sl-tb-uname">{{ userName }}</div>
        <div class="sl-tb-urole">Vendeur</div>
      </div>
      <span style="color:rgba(255,255,255,.3);font-size:.65rem;margin-left:.25rem;">▾</span>
      <div class="sl-dropdown" [class.sl-dropdown-hidden]="!showUserDropdown" (click)="$event.stopPropagation()">
        <div class="sl-dp-head">
          <div class="sl-dp-av">
            <img *ngIf="userImageUrl; else sellerDropInitials" [src]="userImageUrl" class="sl-avatar-img" alt="Profile" />
            <ng-template #sellerDropInitials>{{ userInitials }}</ng-template>
          </div>
          <div>
            <div class="sl-dp-name">{{ userName }}</div>
            <div class="sl-dp-email">{{ userEmail }}</div>
          </div>
        </div>
        <div style="padding:.25rem 0;">
          <button type="button" class="sl-dp-item" (click)="goToMyProfile()">👤 My Profile</button>
          <button type="button" class="sl-dp-item">📊 Statistics</button>
          <div class="sl-dp-sep"></div>
          <button type="button" class="sl-dp-item">❓ Help & Support</button>
          <div class="sl-dp-sep"></div>
          <button type="button" class="sl-dp-item sl-red" (click)="logout()">🚪 Logout</button>
        </div>
      </div>
    </div>
  </div>
</div>

<nav class="sl-route-nav">
  <a routerLink="/seller/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }">Tableau de bord</a>
  <a routerLink="/seller/vehicles" routerLinkActive="active">Véhicules (parc)</a>
  <a routerLink="/seller/listings" routerLinkActive="active">Annonces</a>
  <a routerLink="/seller/orders" routerLinkActive="active">Commandes</a>
</nav>

<main class="sl-main sl-main-routed">
  <router-outlet></router-outlet>
</main>
